# Stashify worker for unRAID / Docker  (BeastNAS deploy).
#
# Run from this directory:  docker compose up -d
#
# Secrets come from a local .env file next to this compose (gitignored):
#   STASH_API_KEY=<from Stash > Settings > Security, or its config.yml>
#   WORKER_TOKEN=<shared secret; set the same value in the plugin's Worker Token>
#
# CRITICAL — path matching: media is mounted at the SAME container paths Stash
# uses (/stuff, /stuff2) so the absolute paths Stash stores resolve here too.
# On BeastNAS the Stash container maps:
#   /mnt/user/Download/torrents/Stuff -> /stuff
#   /mnt/user/Stuff                   -> /stuff2
services:
  stashify:
    # Prebuilt GHCR image (default):
    #   docker login ghcr.io -u nphil   # one-time (private package)
    #   docker compose pull && docker compose up -d
    # For local dev, comment out `image:`, uncomment `build:`, then:
    #   docker compose up -d --build
    image: ghcr.io/nphil/stashify:latest
    # build: .
    container_name: Stashify
    labels:
      # unRAID Docker tab reads these: container icon + a WebUI link.
      net.unraid.docker.icon: "https://raw.githubusercontent.com/nphil/stashify/main/assets/icon-256.png"
      net.unraid.docker.webui: "https://stashify.nateshome.net/"
    # Thin coordinator: NO GPU, no CUDA, no models — all compute happens in the
    # `runner` service below.
    ports:
      - "8710:8710"          # the on-demand HTTP API the Stash UI button calls
    environment:
      # --- mode ---
      RUN_MODE: "server"                 # server = on-demand UI button (default); worker = tag batch
      PORT: "8710"
      WORKER_TOKEN: "${WORKER_TOKEN:-}"  # from .env

      # --- connection ---
      STASH_URL: "http://192.168.1.69:6969"   # Stash on BeastNAS (host port 6969 -> container 9999)
      STASH_API_KEY: "${STASH_API_KEY:-}"     # from .env (Stash auth is enabled)

      # --- pipeline: dispatched to the compute runner ---
      BACKEND: "lada"                    # lada | upscale | command
      LADA_URL: "http://runner:8711"
      LADA_TOKEN: "${WORKER_TOKEN:-}"
      LADA_SCRATCH: "/scratch"

      # --- library ---
      OUTPUT_DIR: "/stuff2/decensored"   # inside the /stuff2 library so previews scan in
    volumes:
      - /mnt/user/Download/torrents/Stuff:/stuff     # == Stash's /stuff
      - /mnt/user/Stuff:/stuff2                       # == Stash's /stuff2
      # Shared handoff with the compute runner. Deliberately OUTSIDE the Stash
      # libraries so half-written intermediates can never get scanned as scenes.
      - /mnt/user/appdata/decensor/scratch:/scratch
    restart: unless-stopped

  # Compute runner (Pascal cu126 build): Lada decensoring + SPAN upscaling +
  # GPU telemetry. The first "runner" of the coordinator/runner design.
  runner:
    # Prebuilt GHCR image (default). For local dev, comment out `image:` and
    # uncomment `build:` below.
    image: ghcr.io/nphil/stashify-runner:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.lada
    container_name: Stashify-Runner
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/nphil/stashify/main/assets/icon-256.png"
    runtime: nvidia
    ports:
      - "8711:8711"          # exposed so unRAID-template / other-host deployments can reach the runner
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      LADA_TOKEN: "${WORKER_TOKEN:-}"    # same shared secret the worker sends
      LADA_DEVICE: "cuda"
      GPU_ID: "0"
      PORT: "8711"
    volumes:
      - /mnt/user/Download/torrents/Stuff:/stuff:ro   # read inputs at the same paths
      - /mnt/user/Stuff:/stuff2:ro
      - /mnt/user/appdata/decensor/scratch:/scratch   # write outputs here (worker reads them)
      - /mnt/user/appdata/decensor/lada-models:/models  # persists Lada weights (~GB)
    restart: unless-stopped

# unRAID without the compose plugin? Equivalent docker run (fill in the secrets):
#
#   docker run -d --name Stashify -p 8710:8710 \
#     -e STASH_URL=http://192.168.1.69:6969 -e STASH_API_KEY=<key> -e WORKER_TOKEN=<token> \
#     -e BACKEND=lada -e LADA_URL=http://<runner-host>:8711 -e LADA_TOKEN=<token> \
#     -e OUTPUT_DIR=/stuff2/decensored \
#     -v /mnt/user/Download/torrents/Stuff:/stuff -v /mnt/user/Stuff:/stuff2 \
#     -v /mnt/user/appdata/decensor/scratch:/scratch \
#     ghcr.io/nphil/stashify:latest
