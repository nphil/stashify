name: Stashify
description: Stashify — upscale & decensor for Stash. Remove mosaic censorship and upscale scenes you pick (via a trigger tag) through the Stashify worker (DeepMosaics / Real-ESRGAN / external tools like TecoGAN or JavPlayer), then import the cleaned result back into Stash.
version: 1.1.1
url: https://github.com/nphil/stashify
exec:
  - python
  - "{pluginDir}/plugin.py"
interface: raw
ui:
  javascript:
    - stashify.js
  css:
    - stashify.css
settings:
  # --- UI button / worker connection (primary, on-demand flow) ---
  workerUrl:
    displayName: Worker URL
    description: "Base URL of the Stashify worker container as reachable from your browser, e.g. https://stashify.nateshome.net"
    type: STRING
  workerToken:
    displayName: Worker Token
    description: "Must match the worker's WORKER_TOKEN env (optional; recommended). Sent as X-Decensor-Token."
    type: STRING
  # --- selection / bookkeeping ---
  triggerTag:
    displayName: Trigger Tag
    description: "Scenes carrying this tag are the ones you 'pick'. Default: Decensor"
    type: STRING
  doneTag:
    displayName: Done Tag
    description: "Applied once a scene is processed (and to the new decensored scene). Prevents reprocessing. Default: Decensored"
    type: STRING
  outputDir:
    displayName: Output Directory
    description: "Where cleaned files are written. Must be inside a Stash library path so it can be scanned in. Required."
    type: STRING
  importResult:
    displayName: Import Result Into Stash
    description: "After cleaning, scan the output into Stash and copy title/performers/studio/tags. Default: on"
    type: BOOLEAN
  gpuId:
    displayName: GPU ID
    description: "GPU index. -1 = CPU (very slow). Default: 0"
    type: NUMBER
  # --- pipeline ---
  backend:
    displayName: Backend
    description: "Primary tool: deepmosaics | realesrgan | command. Default: deepmosaics"
    type: STRING
  postUpscale:
    displayName: Real-ESRGAN Post-Upscale
    description: "Run Real-ESRGAN as a second pass after the backend (best quality). Ignored if backend is already realesrgan. Default: off"
    type: BOOLEAN
  # --- DeepMosaics backend ---
  deepMosaicsDir:
    displayName: DeepMosaics Directory
    description: "Absolute path to your DeepMosaics checkout (folder with deepmosaic.py)."
    type: STRING
  modelPath:
    displayName: DeepMosaics Clean Model
    description: "Path to the DeepMosaics 'clean' weights, e.g. clean_youknow_video.pth."
    type: STRING
  pythonBin:
    displayName: DeepMosaics Python
    description: "Interpreter with DeepMosaics' deps (torch). Default: python"
    type: STRING
  maskThreshold:
    displayName: DeepMosaics Mask Threshold
    description: "Mosaic-detection sensitivity 0-255; lower = more aggressive. Default: 64"
    type: NUMBER
  # --- Real-ESRGAN backend / post-upscale ---
  realEsrganDir:
    displayName: Real-ESRGAN Directory
    description: "Absolute path to your Real-ESRGAN checkout (folder with inference_realesrgan_video.py)."
    type: STRING
  realEsrganPython:
    displayName: Real-ESRGAN Python
    description: "Interpreter with Real-ESRGAN's deps. Default: python"
    type: STRING
  realEsrganModel:
    displayName: Real-ESRGAN Model
    description: "Model name, e.g. realesr-animevideov3, RealESRGAN_x4plus, realesr-general-x4v3. Default: realesr-animevideov3"
    type: STRING
  realEsrganScale:
    displayName: Real-ESRGAN Scale
    description: "Output upscale factor. Default: 2"
    type: NUMBER
  realEsrganFaceEnhance:
    displayName: Real-ESRGAN Face Enhance
    description: "Use GFPGAN face enhancement. Default: off"
    type: BOOLEAN
  realEsrganFp32:
    displayName: Real-ESRGAN FP32
    description: "Use fp32 precision. Keep ON for Pascal cards (e.g. Tesla P40) — their fp16 is ~1/64 speed. Default: on"
    type: BOOLEAN
  realEsrganTile:
    displayName: Real-ESRGAN Tile
    description: "Tile size to bound VRAM on large frames; 0 = no tiling. Try 512 if you hit out-of-memory. Default: 0"
    type: NUMBER
  # --- generic command backend ---
  commandTemplate:
    displayName: Command Template
    description: "For backend=command. Placeholders (each its own token): {input} {output_dir} {gpu}. E.g. a TecoGAN or JavPlayer-CLI invocation writing into {output_dir}."
    type: STRING
tasks:
  - name: Decensor Tagged Scenes
    description: Run the configured backend on every scene with the trigger tag.
    defaultArgs:
      mode: tagged
  - name: Decensor + Real-ESRGAN Upscale
    description: Run the configured backend, then a Real-ESRGAN pass (best quality).
    defaultArgs:
      mode: tagged
      postUpscale: true
  - name: Upscale Only (Real-ESRGAN)
    description: Real-ESRGAN restore/upscale only — no mosaic removal.
    defaultArgs:
      mode: tagged
      backend: realesrgan
  - name: Import Cleaned Files From Folder
    description: For the manual JavPlayer/GUI flow — scan the output dir and copy metadata from each cleaned file's matching original.
    defaultArgs:
      mode: import
