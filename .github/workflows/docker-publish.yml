name: Build & publish images

# Builds the Stashify worker and runner images in the cloud (no local Docker
# needed) and pushes them to GitHub Container Registry. Triggers:
#   - pushing to main (ignoring docs/assets/unraid/markdown-only changes)
#   - pushing a version tag (v1.2.3)  -> semver tags + sha
#   - manual run (Actions tab / gh)
#
# Deploy on unRAID by pulling instead of building:
#   docker login ghcr.io -u nphil        # one-time (private package)
#   docker compose pull && docker compose up -d

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - 'unraid/**'
      - '**.md'
    tags: ['v*']
  workflow_dispatch:

# One run per ref. Do NOT cancel in-progress builds: the runner image takes
# ~25 min cold, and killing it for a small follow-up commit leaves ghcr without
# the image entirely (this bit us on the very first publish). New pushes queue.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    # The runner image is large (torch cu126 wheels + an ffmpeg compile take
    # ~20-30 min on a cold cache) — keep the timeout at 60m or above.
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: worker
            image: ghcr.io/nphil/stashify
            dockerfile: Dockerfile
            context: .
          - name: runner
            image: ghcr.io/nphil/stashify-runner
            dockerfile: Dockerfile.lada
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
